<!DOCTYPE html>
<html>

<head>
  <title>RPS</title> <!-- Rock Paper Scissors -->

  <style>
    .topic {
      font-weight: bold;
      font-size: 30px;
      margin-bottom: 10px;
    }
  </style>

</head>

<body>

  <p class="topic">Rock Paper Scissors (Basic Draft)</p>
  <p></p>
  <button onclick = "playGame('Rock');">
    Rock</button>

  <button onclick = "playGame('Paper');">
    Paper</button>

  <button onclick = "playGame('Scissors');">
    Scissors</button>

  <button onclick="
  score.wins = 0;
  score.losses = 0;
  score.ties = 0;
  ">Reset Button</button> 

  <script>

    const score = {
      wins: 0,
      losses: 0,
      ties: 0
    };

    function playGame(playerMove) 
    {
      let compMove = pickCompMove();
      let result = '';

      if(playerMove === compMove) 
      { 
        result = 'Tie';
        score.ties++;
      }
      else if((playerMove === 'Rock' && compMove ==='Scissors') ||
              (playerMove === 'Scissors' && compMove === 'Paper') ||
              (playerMove === 'Paper' && compMove === 'Rock')) 
      {
        result = 'You Won'; 
        score.wins++;
      }
      else if((playerMove === 'Rock' && compMove === 'Paper') ||
              (playerMove === 'Scissors' && compMove === 'Rock') ||
              (playerMove === 'Paper' && compMove === "Scissors")) 
      {
        result = 'You Lost';
        score.losses++; 
      }

      alert(`You Picked ${playerMove}. Computer Picked ${compMove}. ${result}
Wins: ${score.wins}, Losses: ${score.losses}, Ties: ${score.ties}`);

    }

    // let compMove = ''; //if we do NOT add a return statement in the func
    function pickCompMove() {
      let compMove = ''; //if we add a return statement in the func
      const randomNum = Math.random();
      if (randomNum >= 0 && randomNum < 1 / 3) { 
        compMove = 'Rock'; 
      }
      else if (randomNum >= 1 / 3 && randomNum < 2 / 3) { 
        compMove = 'Paper'; 
      }
      else if (randomNum >= 2/3 && randomNum < 1) { 
        compMove = 'Scissors'; 
      }
      
      return compMove;
    }
    
  </script>
</body>

</html>
